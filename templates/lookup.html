<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticker Lookup — Momentum Screener</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/lookup.css">
</head>
<body>
  <header>
    <div class="header-content">
      <nav class="nav-links">
        <a href="/" class="nav-link">Screener</a>
        <a href="/lookup" class="nav-link active">Ticker Lookup</a>
      </nav>
      <h1>Ticker Lookup</h1>
      <p class="subtitle">Search any stock for charts, fundamentals &amp; latest news</p>
    </div>
  </header>

  <main id="main">
    <!-- Search bar -->
    <section class="search-section">
      <form id="search-form" onsubmit="return handleSearch(event)">
        <div class="search-bar">
          <input type="text" id="ticker-input" placeholder="Enter ticker symbol (e.g. AAPL, TSLA, NVDA)" autocomplete="off" spellcheck="false">
          <button type="submit" id="search-btn">Search</button>
        </div>
      </form>
    </section>

    <!-- Loading -->
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Fetching data...</p>
    </div>

    <!-- Error -->
    <div id="error-msg" class="hidden error-card"></div>

    <!-- Results -->
    <div id="results" class="hidden">

      <!-- Company header -->
      <section class="company-header" id="company-header">
        <div class="company-title">
          <h2 id="res-symbol"></h2>
          <span id="res-company" class="company-name"></span>
          <span id="res-industry" class="company-industry"></span>
        </div>
        <div class="price-block">
          <span id="res-price" class="price-value"></span>
          <span id="res-change" class="price-change"></span>
        </div>
      </section>

      <!-- Chart -->
      <section class="lookup-chart-section">
        <div class="charts-header">
          <h3>Price Chart</h3>
          <div class="period-buttons" id="lookup-period-btns">
            <button class="period-btn" data-period="1d">1D</button>
            <button class="period-btn active" data-period="5d">5D</button>
            <button class="period-btn" data-period="1mo">1M</button>
            <button class="period-btn" data-period="3mo">3M</button>
            <button class="period-btn" data-period="6mo">6M</button>
            <button class="period-btn" data-period="1y">1Y</button>
          </div>
        </div>
        <div class="lookup-chart-card">
          <div class="chart-container" id="lookup-chart">
            <div class="chart-loading">Select a period to view chart</div>
          </div>
        </div>
      </section>

      <!-- Metrics + News side by side -->
      <section class="info-grid">
        <!-- Key metrics -->
        <div class="info-panel metrics-panel">
          <h3>Key Metrics</h3>
          <div class="metrics-table" id="metrics-table"></div>
        </div>

        <!-- News -->
        <div class="info-panel news-panel">
          <h3>Latest News &amp; Updates</h3>
          <div id="news-list" class="news-list"></div>
        </div>
      </section>
    </div>
  </main>

  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/static/lookup.js"></script>
</body>
</html>
